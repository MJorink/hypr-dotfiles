# name "High-Edited"
# credit https://github.com/mylinuxforwork/dotfiles

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 10, wind, slide
    animation = windowsIn, 1, 10, winIn, slide
    animation = windowsOut, 1, 10, winOut, slide
    animation = windowsMove, 1, 10, wind, slide
    animation = border, 1, 10, liner
    animation = borderangle, 1, 30, liner, once
    animation = fade, 1, 10, default
    animation = workspaces, 1, 10, wind
}
